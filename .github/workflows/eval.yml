name: Trade-Auswertung SOLID+RISK

on:
  schedule:
    # Mo-Fr 20:16 UTC = 22:16 Berlin (Sommer) — nach US-Schluss.
    - cron: '16 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: duo-eval
  cancel-in-progress: false

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Alpaca-Sync (echte Fills)
        env:
          ALPACA_SOLID_KEY: ${{ secrets.ALPACA_SOLID_KEY }}
          ALPACA_SOLID_SECRET: ${{ secrets.ALPACA_SOLID_SECRET }}
          ALPACA_RISK_KEY: ${{ secrets.ALPACA_RISK_KEY }}
          ALPACA_RISK_SECRET: ${{ secrets.ALPACA_RISK_SECRET }}
        run: python scripts/alpaca_sync.py
      - name: Yahoo-Fallback-Auswertung
        run: python scripts/trade_eval.py
      - name: Commit & Push
        run: |
          if git diff --quiet data/; then echo "Keine Änderung."; exit 0; fi
          git config user.name "eval-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/solid_journal.json data/risk_journal.json
          git commit -m "Auswertung $(TZ=Europe/Berlin date +%d.%m.%Y)"
          for i in 1 2 3; do git push && exit 0; git pull --rebase; done
          exit 1

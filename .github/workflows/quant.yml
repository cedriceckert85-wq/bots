name: Quant-Snapshot

on:
  schedule:
    # Mo-Fr 21:37 UTC = 23:37 Berlin (Sommer) — nach US-Schluss, vor den Entscheider-Laeufen.
    - cron: '37 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quant-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Kennzahlen berechnen
        run: python scripts/quant_snapshot.py
      - name: Commit & Push
        run: |
          if git diff --quiet data/quant_snapshot.json 2>/dev/null && [ -f data/quant_snapshot.json ]; then
            echo "Keine Änderung."
            exit 0
          fi
          git config user.name "quant-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/quant_snapshot.json
          git commit -m "Quant-Snapshot $(TZ=Europe/Berlin date +%d.%m.%Y)"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          exit 1

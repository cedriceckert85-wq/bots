name: Alpaca-Orders SOLID+RISK

on:
  schedule:
    # Di-Sa 01:26 UTC = 03:26 Berlin — NACH den Entscheider-Läufen (02:53/03:08 Berlin),
    # damit frische Journal-Trades sofort als Bracket-Orders ins jeweilige Konto gehen.
    - cron: '26 1 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: duo-orders
  cancel-in-progress: false

jobs:
  orders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Orders platzieren & syncen
        env:
          ALPACA_SOLID_KEY: ${{ secrets.ALPACA_SOLID_KEY }}
          ALPACA_SOLID_SECRET: ${{ secrets.ALPACA_SOLID_SECRET }}
          ALPACA_RISK_KEY: ${{ secrets.ALPACA_RISK_KEY }}
          ALPACA_RISK_SECRET: ${{ secrets.ALPACA_RISK_SECRET }}
        run: python scripts/alpaca_sync.py
      - name: Commit & Push
        run: |
          if git diff --quiet data/; then echo "Keine Änderung."; exit 0; fi
          git config user.name "alpaca-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/solid_journal.json data/risk_journal.json
          git commit -m "Alpaca-Orders $(TZ=Europe/Berlin date +%d.%m.%Y' '%H:%M)"
          for i in 1 2 3; do git push && exit 0; git pull --rebase; done
          exit 1

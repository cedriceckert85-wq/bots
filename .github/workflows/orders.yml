name: Alpaca-Orders SOLID+RISK+CODEX

on:
  # schedule: DEAKTIVIERT 2026-06-21 (Flotte 2.0: alles auf den Pi -> Orders laufen ueber die Pi-Session/Timer durchs Risk-Gate, nicht aus der Cloud). Manuell weiter via workflow_dispatch.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: swing-orders
  cancel-in-progress: false

jobs:
  orders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Orders platzieren & syncen
        env:
          ALPACA_SOLID_KEY: ${{ secrets.ALPACA_SOLID_KEY }}
          ALPACA_SOLID_SECRET: ${{ secrets.ALPACA_SOLID_SECRET }}
          ALPACA_RISK_KEY: ${{ secrets.ALPACA_RISK_KEY }}
          ALPACA_RISK_SECRET: ${{ secrets.ALPACA_RISK_SECRET }}
          ALPACA_CODEX_KEY: ${{ secrets.ALPACA_CODEX_KEY }}
          ALPACA_CODEX_SECRET: ${{ secrets.ALPACA_CODEX_SECRET }}
        run: python scripts/alpaca_sync.py
      - name: Commit & Push
        run: |
          if git diff --quiet data/; then echo "Keine Änderung."; exit 0; fi
          git config user.name "alpaca-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/solid_journal.json data/risk_journal.json data/codex_journal.json
          git commit -m "Alpaca-Orders $(TZ=Europe/Berlin date +%d.%m.%Y' '%H:%M)"
          for i in 1 2 3; do git push && exit 0; git pull --rebase; done
          exit 1

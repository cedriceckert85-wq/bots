name: DAYTRADER Signal

on:
  schedule:
    # US-Open + ca. 10 Minuten. Beide UTC-Zeiten decken Sommer/Winterzeit ab;
    # das Script schreibt nur im fruehen Signalfenster und nie rueckwirkend.
    - cron: '40 13 * * 1-5'
    - cron: '40 14 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daytrader-signal
  cancel-in-progress: false

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: DAYTRADER Signal + Alpaca Paper
        env:
          ALPACA_DAYTRADER_KEY: ${{ secrets.ALPACA_DAYTRADER_KEY }}
          ALPACA_DAYTRADER_SECRET: ${{ secrets.ALPACA_DAYTRADER_SECRET }}
        run: python scripts/daytrader.py --write --evaluate --alpaca
      - name: Commit & Push
        run: |
          if git diff --quiet data/daytrader_journal.json; then echo "Keine Aenderung."; exit 0; fi
          git config user.name "daytrader-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/daytrader_journal.json
          git commit -m "DAYTRADER Signal $(TZ=Europe/Berlin date +%d.%m.%Y' '%H:%M)"
          for i in 1 2 3; do git push && exit 0; git pull --rebase; done
          exit 1

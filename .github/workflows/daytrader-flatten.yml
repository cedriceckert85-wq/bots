name: DAYTRADER Close Guard

on:
  # schedule: DEAKTIVIERT 2026-06-21 (Flotte 2.0: alles auf den Pi -> Orders laufen ueber die Pi-Session/Timer durchs Risk-Gate, nicht aus der Cloud). Manuell weiter via workflow_dispatch.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daytrader-flatten
  cancel-in-progress: false

jobs:
  flatten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: DAYTRADER Close Guard
        env:
          ALPACA_DAYTRADER_KEY: ${{ secrets.ALPACA_DAYTRADER_KEY }}
          ALPACA_DAYTRADER_SECRET: ${{ secrets.ALPACA_DAYTRADER_SECRET }}
        run: python scripts/daytrader.py --evaluate --alpaca --flatten
      - name: Commit & Push
        run: |
          if git diff --quiet data/daytrader_journal.json; then echo "Keine Aenderung."; exit 0; fi
          git config user.name "daytrader-close-guard"
          git config user.email "actions@users.noreply.github.com"
          git add data/daytrader_journal.json
          git commit -m "DAYTRADER Close Guard $(TZ=Europe/Berlin date +%d.%m.%Y' '%H:%M)"
          for i in 1 2 3; do git push && exit 0; git pull --rebase; done
          exit 1
